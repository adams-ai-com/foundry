name: gitleaks

# Secret scan on every push and PR. Fails the build if any secret is detected.
on:
  push:
  pull_request:

jobs:
  gitleaks:
    name: scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so secrets in any commit are caught
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
