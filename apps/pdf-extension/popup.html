<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #111827;
      background: #fff;
    }
    .header {
      background: #111827;
      color: #f9fafb;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header svg { flex-shrink: 0 }
    .header-title { font-weight: 700; font-size: 14px }
    .header-sub { font-size: 11px; color: #6b7280; margin-top: 1px }
    .body { padding: 16px }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      margin-bottom: 14px;
      font-size: 12px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0 }
    .dot.green { background: #22c55e }
    .dot.gray  { background: #9ca3af }
    .status-text { color: #374151 }
    .btn {
      display: block; width: 100%;
      background: #3b82f6; color: #fff;
      border: none; border-radius: 8px;
      padding: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center; text-decoration: none;
      transition: background .15s;
    }
    .btn:hover { background: #2563eb }
    .btn.secondary {
      background: #f3f4f6; color: #374151; margin-top: 8px;
    }
    .btn.secondary:hover { background: #e5e7eb }
    .tip {
      margin-top: 14px;
      padding: 10px 12px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      font-size: 11.5px;
      color: #92400e;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
    <div>
      <div class="header-title">Foundry PDF</div>
      <div class="header-sub">Edit any PDF in your browser</div>
    </div>
  </div>

  <div class="body">
    <div class="status" id="status">
      <div class="dot gray" id="dot"></div>
      <span class="status-text" id="status-text">Checking…</span>
    </div>

    <a href="https://foundry.adams-ai.com/pdf" target="_blank" class="btn" id="open-btn">
      Open Foundry PDF
    </a>
    <a href="https://foundry.adams-ai.com/login" target="_blank" class="btn secondary" id="login-btn" style="display:none">
      Sign in to Foundry
    </a>

    <div class="tip">
      <strong>Tip:</strong> Right-click any PDF link and choose <em>Edit in Foundry PDF</em>,
      or browse to a PDF and click the banner at the top of the page.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
