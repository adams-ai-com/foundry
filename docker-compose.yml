# Foundry self-host quickstart.
#   cp .env.example .env   # (edit POSTGRES_PASSWORD / FOUNDRY_DOMAIN)
#   docker compose up -d --build
# Then open http://localhost (or your FOUNDRY_DOMAIN) and create the admin account.
#
# This brings up the apps whose schema ships in this repo (Workspace, Wiki).
# Additional apps are added as their self-host packaging lands — see QUICKSTART.md.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: foundry
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foundry}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundry"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: apply each app's schema to its database, then exit.
  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-foundry}
    volumes:
      - ./apps/workspace/lib/schema.sql:/sql/foundry_workspace.sql:ro
      - ./apps/wiki/lib/schema.sql:/sql/foundry_wiki.sql:ro
      - ./apps/docs/lib/schema.sql:/sql/foundry_docs.sql:ro
      - ./apps/sheets/lib/schema.sql:/sql/foundry_sheets.sql:ro
      - ./apps/sites/lib/schema.sql:/sql/foundry_sites.sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # Apply each app's schema once. Skip a DB that already has tables so
        # down+up re-runs are safe (the docs/sheets/sites dumps aren't IF NOT EXISTS).
        for db in foundry_workspace foundry_wiki foundry_docs foundry_sheets foundry_sites; do
          n=$$(psql -h postgres -U foundry -d "$$db" -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'")
          if [ "$$n" = "0" ]; then echo "migrating $$db"; psql -h postgres -U foundry -d "$$db" -v ON_ERROR_STOP=1 -f "/sql/$$db.sql"; else echo "$$db already migrated (skip)"; fi
        done
        echo "migrations applied"
    restart: "no"

  workspace:
    build:
      context: .
      dockerfile: apps/workspace/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://foundry:${POSTGRES_PASSWORD:-foundry}@postgres:5432/foundry_workspace
    depends_on:
      migrate:
        condition: service_completed_successfully

  wiki:
    build:
      context: .
      dockerfile: apps/wiki/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://foundry:${POSTGRES_PASSWORD:-foundry}@postgres:5432/foundry_wiki
    depends_on:
      migrate:
        condition: service_completed_successfully

  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://foundry:${POSTGRES_PASSWORD:-foundry}@postgres:5432/foundry_docs
    depends_on:
      migrate:
        condition: service_completed_successfully

  sheets:
    build:
      context: .
      dockerfile: apps/sheets/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://foundry:${POSTGRES_PASSWORD:-foundry}@postgres:5432/foundry_sheets
    depends_on:
      migrate:
        condition: service_completed_successfully

  sites:
    build:
      context: .
      dockerfile: apps/sites/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://foundry:${POSTGRES_PASSWORD:-foundry}@postgres:5432/foundry_sites
    depends_on:
      migrate:
        condition: service_completed_successfully

  # PDF processing engine (PyMuPDF + LibreOffice + pdf2docx). Internal only.
  pdf-proc:
    build:
      context: https://github.com/adams-ai-com/foundry-pdf-proc.git#main
    restart: unless-stopped
    environment:
      FOUNDRY_PDF_PROC_SECRET: ${PDF_PROC_SECRET:-change-me-pdf-proc-secret}
    volumes:
      - pdfdata:/data

  # PDF app (editor UI). Talks to pdf-proc; no database needed.
  pdf:
    build:
      context: .
      dockerfile: apps/pdf/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      FOUNDRY_PDF_PROC_URL: http://pdf-proc:3200
      FOUNDRY_PDF_PROC_SECRET: ${PDF_PROC_SECRET:-change-me-pdf-proc-secret}
    depends_on:
      - pdf-proc

  # Mail server: REST API (mail app talks to it) + optional SMTP. Internal only.
  mailserver:
    build:
      context: .
      dockerfile: services/mailserver/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://foundry:${POSTGRES_PASSWORD:-foundry}@postgres:5432/foundry_mail
      API_PORT: 3002
      API_KEY: ${MAIL_API_KEY:-change-me-mail-api-key}
      MAIL_DOMAIN: ${FOUNDRY_DOMAIN:-localhost}
      ATTACHMENTS_DIR: /data/attachments
      # Outbound email needs an SMTP relay (set SMTP_RELAY_* in .env); without it, mail is internal-only.
    volumes:
      - maildata:/data/attachments
    depends_on:
      mail-migrate:
        condition: service_completed_successfully

  # One-shot: apply the mail schema and provision a default account ('default').
  mail-migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-foundry}
    volumes:
      - ./services/mailserver/src/schema.sql:/sql/mail.sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        psql -h postgres -U foundry -d foundry_mail -v ON_ERROR_STOP=1 -f /sql/mail.sql
        psql -h postgres -U foundry -d foundry_mail -c "INSERT INTO accounts (id, domain, display_name) VALUES ('default', '${FOUNDRY_DOMAIN:-localhost}', 'Foundry Mail') ON CONFLICT (id) DO NOTHING;"
        echo "mail migrated"
    restart: "no"

  mail:
    build:
      context: .
      dockerfile: apps/mail/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MAILSERVER_URL: http://mailserver:3002
      MAILSERVER_HEALTH_URL: http://mailserver:3002/health
      MAILSERVER_API_KEY: ${MAIL_API_KEY:-change-me-mail-api-key}
      MAILSERVER_ACCOUNT_ID: default
      NEXT_PUBLIC_DISPLAY_NAME: Foundry Mail
      NEXT_PUBLIC_MAIL_FROM: ${MAIL_FROM:-foundry@localhost}
    depends_on:
      - mailserver

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      FOUNDRY_DOMAIN: ${FOUNDRY_DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - workspace
      - wiki
      - pdf
      - mail
      - docs
      - sheets
      - sites

volumes:
  pgdata:
  caddydata:
  caddyconfig:
  pdfdata:
  maildata:
